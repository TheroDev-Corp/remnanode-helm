apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    # Logging
    logs:
      general:
        level: DEBUG
    
    # Persistence for ACME
    persistence:
      enabled: true
      path: /acme
      size: 128Mi
    
    # Fix permissions for ACME json
    deployment:
      podSecurityContext:
        fsGroup: 65532

    # Let's Encrypt arguments
    additionalArguments:
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.le.acme.email=$(TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_EMAIL)"
      - "--certificatesresolvers.le.acme.caServer=https://acme-v02.api.letsencrypt.org/directory"

    # Inject Email
    env:
      - name: TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_EMAIL
        valueFrom:
          secretKeyRef:
            name: traefik-acme-secret
            key: email
    
    # Protocol Configuration
    ports:
      web:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
      websecure:
        http3:
          enabled: true
        tls:
          enabled: true

    service:
      enabled: true
      type: LoadBalancer
      ports:
        web:
          port: 80
          protocol: TCP
          expose: true
          targetPort: web
        websecure:
          port: 443
          protocol: TCP
          expose: true
          targetPort: websecure
        websecure-udp:
          port: 443
          protocol: UDP
          expose: true
          targetPort: websecure