apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "remnanode.fullname" . }}-sync-geo
  labels:
    {{- include "remnanode.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    spec:
      securityContext:
        runAsUser: 0
      containers:
      - name: downloader
        image: curlimages/curl:8.18.0
        command: ["/bin/sh", "/scripts/download.sh"]
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: storage
          mountPath: /data
      restartPolicy: OnFailure
      volumes:
      - name: scripts
        configMap:
          name: {{ include "remnanode.fullname" . }}-downloader-script
      - name: storage
        persistentVolumeClaim:
          claimName: {{ include "remnanode.fullname" . }}-geodata