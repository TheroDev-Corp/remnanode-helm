spec:
  template:
    spec:
      securityContext:
        runAsUser: 0
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: {{ include "remnanode.name" . }}
              topologyKey: kubernetes.io/hostname
      containers:
      - name: downloader
        image: curlimages/curl:8.18.0
        command: ["/bin/sh", "/scripts/download.sh"]
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: storage
          mountPath: /data
      restartPolicy: OnFailure
      volumes:
      - name: scripts
        configMap:
          name: {{ include "remnanode.fullname" . }}-downloader-script
      - name: storage
        persistentVolumeClaim:
          claimName: {{ include "remnanode.fullname" . }}-geodata