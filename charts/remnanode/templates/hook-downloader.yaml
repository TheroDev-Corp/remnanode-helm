apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "remnanode.fullname" . }}-pre-sync-downloader
  labels:
    {{- include "remnanode.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      name: {{ include "remnanode.fullname" . }}-pre-sync-downloader
      labels:
        app.kubernetes.io/component: pre-sync-hook
    spec:
      restartPolicy: Never
      containers:
      - name: downloader
        image: curlimages/curl:8.18.0
        command: ["/bin/sh", "/scripts/download.sh"]
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: xray-data-cache
          mountPath: /data
      volumes:
      - name: scripts
        configMap:
          name: {{ include "remnanode.fullname" . }}-downloader-script
      - name: xray-data-cache
        hostPath:
          path: {{ printf "%s/%s-data" .Values.node.dataDir (include "remnanode.fullname" .) }}
          type: DirectoryOrCreate