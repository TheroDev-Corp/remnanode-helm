# charts/remnanode/templates/ingress.yaml
{{- if .Values.ingress.enabled }}
{{- $fullName := include "remnanode.fullname" . -}}
{{- $domain := .Values.global.domain -}}

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $fullName }}-ws-headers
  labels:
    {{- include "remnanode.labels" . | nindent 4 }}
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
      Upgrade: "websocket"
      Connection: "Upgrade"

---
# 1. Main Website (Fallback/Camouflage)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullName }}-web
  labels:
    {{- include "remnanode.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ $domain }}`)
      kind: Rule
      services:
        - name: {{ $fullName }}
          port: 80
  {{- if .Values.ingress.tls.enabled }}
  tls:
    {{- if .Values.ingress.tls.secretName }}
    secretName: {{ .Values.ingress.tls.secretName }}
    {{- else if .Values.ingress.tls.certResolver }}
    certResolver: {{ .Values.ingress.tls.certResolver }}
    {{- end }}
  {{- end }}

---
# Маршрутизация на основе Inbounds
{{- range .Values.inbounds }}

{{- /* 2. WebSocket & XHTTP Routing */}}
{{- if or (eq .mode "ingress-path") (eq .mode "ingress-xhttp") }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullName }}-{{ .name }}
  labels:
    {{- include "remnanode.labels" $ | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ $domain }}`) && PathPrefix(`{{ .path }}`)
      kind: Rule
      {{- if eq .mode "ingress-path" }}
      middlewares:
        - name: {{ $fullName }}-ws-headers
      {{- end }}
      services:
        - name: {{ $fullName }}
          port: {{ .port }}
          passHostHeader: true
  {{- if $.Values.ingress.tls.enabled }}
  tls:
    {{- if $.Values.ingress.tls.secretName }}
    secretName: {{ $.Values.ingress.tls.secretName }}
    {{- else if $.Values.ingress.tls.certResolver }}
    certResolver: {{ $.Values.ingress.tls.certResolver }}
    {{- end }}
  {{- end }}
---
{{- end }}

{{- /* 3. gRPC Routing */}}
{{- if eq .mode "ingress-grpc" }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullName }}-{{ .name }}
  labels:
    {{- include "remnanode.labels" $ | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ $domain }}`) && PathPrefix(`/{{ .serviceName }}`)
      kind: Rule
      services:
        - name: {{ $fullName }}
          port: {{ .port }}
          passHostHeader: true
          scheme: h2c
  {{- if $.Values.ingress.tls.enabled }}
  tls:
    {{- if $.Values.ingress.tls.secretName }}
    secretName: {{ $.Values.ingress.tls.secretName }}
    {{- else if $.Values.ingress.tls.certResolver }}
    certResolver: {{ $.Values.ingress.tls.certResolver }}
    {{- end }}
  {{- end }}
---
{{- end }}

{{- /* 4. Reality/Trojan (SNI TCP Routing) */}}
{{- if eq .mode "ingress-sni" }}
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ $fullName }}-{{ .name }}
  labels:
    {{- include "remnanode.labels" $ | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: {{ range $i, $d := .sni }}{{ if $i }} || {{ end }}HostSNI(`{{ $d }}`){{ end }}
      services:
        - name: {{ $fullName }}
          port: {{ .port }}
  # Для SNI (Reality) TLS всегда прозрачный (passthrough)
  tls:
    passthrough: true
---
{{- end }}

{{- end }}{{/* End range inbounds */}}
{{- end }}{{/* End if ingress.enabled */}}