{{- if .Values.website.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remnanode.fullname" . }}-website
  labels:
    {{- include "remnanode.labels" . | nindent 4 }}
    app.kubernetes.io/component: website
spec:
  replicas: 1
  # Website can use RollingUpdate safely
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "remnanode.name" . }}-website
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "remnanode.name" . }}-website
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: website
    spec:
      automountServiceAccountToken: false
      hostNetwork: false
      containers:
        - name: website
          image: "{{ .Values.website.image.repository }}:{{ .Values.website.image.tag }}"
          imagePullPolicy: {{ .Values.website.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          resources:
            {{- toYaml .Values.website.resources | nindent 12 }}
{{- end }}