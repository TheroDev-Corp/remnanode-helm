{{- if .Values.autoUpdate.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "remnanode.fullname" . }}-daily-restart
  labels:
    {{- include "remnanode.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.autoUpdate.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ include "remnanode.fullname" . }}-updater
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
          - name: kubectl-restart
            image: "{{ .Values.autoUpdate.image.repository }}:{{ .Values.autoUpdate.image.tag }}"
            command:
            - /bin/sh
            - -c
            - |
              echo "Triggering daily rollout restart to apply new geodata..."
              kubectl rollout restart deployment/{{ include "remnanode.fullname" . }}
          restartPolicy: OnFailure
{{- end }}