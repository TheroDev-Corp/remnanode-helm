{{- if .Values.autoUpdate.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "remnanode.fullname" . }}-daily-update
  labels:
    {{- include "remnanode.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.autoUpdate.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/component: cronjob
        spec:
          serviceAccountName: {{ include "remnanode.fullname" . }}-updater
          
          initContainers:
          - name: background-downloader
            image: curlimages/curl:8.18.0
            command:["/bin/sh", "/scripts/download.sh"]
            volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: xray-data-cache
              mountPath: /data

          containers:
          - name: kubectl
            image: "{{ .Values.autoUpdate.image.repository }}:{{ .Values.autoUpdate.image.tag }}"
            imagePullPolicy: {{ .Values.autoUpdate.image.pullPolicy }}
            command:
            - /bin/sh
            - -c
            - |
              echo ">>> Triggering instantaneous restart of Xray pod..."
              kubectl rollout restart deployment/{{ include "remnanode.fullname" . }}
          restartPolicy: OnFailure
          
          volumes:
          - name: scripts
            configMap:
              name: {{ include "remnanode.fullname" . }}-downloader-script
          - name: xray-data-cache
            hostPath:
              path: {{ printf "%s/%s-data" .Values.node.dataDir (include "remnanode.fullname" .) }}
              type: DirectoryOrCreate
{{- end }}