apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "remnanode.fullname" . }}-geodata
  labels:
    {{- include "remnanode.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.node.geodata.storageClassName }}
  storageClassName: {{ .Values.node.geodata.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.node.geodata.size | default "512Mi" }}