apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remnanode.fullname" . }}
  annotations:
    "argocd.argoproj.io/sync-wave": "0"
  labels:
    {{- include "remnanode.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "remnanode.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "remnanode.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-downloader.yaml") . | sha256sum }}

    spec:
      automountServiceAccountToken: false
      hostNetwork: {{ .Values.node.hostNetwork | default false }}
      dnsPolicy: {{ if .Values.node.hostNetwork }}ClusterFirstWithHostNet{{ else }}ClusterFirst{{ end }}

      containers:
        - name: remnanode
          image: "{{ .Values.node.image.repository }}:{{ .Values.node.image.tag }}"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: NODE_PORT
              value: {{ .Values.node.apiPort | quote }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ coalesce .Values.node.existingSecret (printf "%s-secrets" (include "remnanode.fullname" .)) }}
                  key: SECRET_KEY
            - name: XRAY_LOCATION_ASSET
              value: /usr/local/bin
          ports:
            - containerPort: {{ .Values.node.apiPort }}
              name: api
              protocol: TCP
              {{- if .Values.node.hostNetwork }}
              hostPort: {{ .Values.node.apiPort }}
              {{- end }}
            {{- range .Values.inbounds }}
            - containerPort: {{ .port }}
              name: tcp-{{ .port }}
              protocol: TCP
              {{- if and $.Values.node.hostNetwork (eq .mode "direct") }}
              hostPort: {{ .port }}
              {{- end }}
            {{- end }}
          volumeMounts:
            - name: geodata
              mountPath: /usr/local/bin/geoip.dat
              subPath: geoip.dat
            - name: geodata
              mountPath: /usr/local/bin/geosite.dat
              subPath: geosite.dat
            - name: geodata
              mountPath: /usr/local/bin/zapret.dat
              subPath: zapret.dat
          resources:
            {{- toYaml .Values.node.resources | nindent 12 }}

      volumes:
      - name: geodata
        persistentVolumeClaim:
          claimName: {{ include "remnanode.fullname" . }}-geodata