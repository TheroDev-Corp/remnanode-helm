apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remnanode.fullname" . }}
  labels:
    {{- include "remnanode.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "remnanode.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "remnanode.selectorLabels" . | nindent 8 }}
      {{- if not .Values.node.existingSecret }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "remnanode.fullname" . }}-updater
      
      # InitContainer стал чуть надежнее (добавлен таймаут)
      initContainers:
      - name: db-downloader
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo ">>> Downloading Xray Databases..."
            apk add --no-cache wget
            mkdir -p /data
            wget -T 10 -qO /data/zapret.dat https://github.com/kutovoys/ru_gov_zapret/releases/latest/download/zapret.dat || echo "Failed zapret.dat"
            wget -T 10 -qO /data/geoip.dat https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geoip.dat || echo "Failed geoip.dat"
            wget -T 10 -qO /data/geosite.dat https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geosite.dat || echo "Failed geosite.dat"
        volumeMounts:
        - name: xray-data
          mountPath: /data

      containers:
        {{- if .Values.website.enabled }}
        - name: website
          image: "{{ .Values.website.image.repository }}:{{ .Values.website.image.tag }}"
          imagePullPolicy: {{ .Values.website.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          resources:
            {{- toYaml .Values.website.resources | nindent 12 }}
        {{- end }}

        - name: remnanode
          image: "{{ .Values.node.image.repository }}:{{ .Values.node.image.tag }}"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: NODE_PORT
              value: {{ .Values.node.apiPort | quote }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ coalesce .Values.node.existingSecret (printf "%s-secrets" (include "remnanode.fullname" .)) }}
                  key: SECRET_KEY
            - name: XRAY_LOCATION_ASSET
              value: /usr/local/bin
          resources:
            {{- toYaml .Values.node.resources | nindent 12 }}
          ports:
            # Management API Port (exposed via HostPort for mTLS)
            - containerPort: {{ .Values.node.apiPort }}
              name: api
              protocol: TCP
              hostPort: {{ .Values.node.apiPort }}

            # Dynamic Inbound Ports
            {{- range .Values.inbounds }}
            
            # TCP Rule
            - containerPort: {{ .port }}
              name: tcp-{{ .port }}
              protocol: TCP
              {{- if eq .mode "direct" }}
              hostPort: {{ .port }}
              {{- end }}

            # UDP Rule (Only for Direct mode)
            {{- if eq .mode "direct" }}
            - containerPort: {{ .port }}
              name: udp-{{ .port }}
              protocol: UDP
              hostPort: {{ .port }}
            {{- end }}

            {{- end }}

          volumeMounts:
            - name: xray-data
              mountPath: /usr/local/bin/geoip.dat
              subPath: geoip.dat
            - name: xray-data
              mountPath: /usr/local/bin/geosite.dat
              subPath: geosite.dat
            - name: xray-data
              mountPath: /usr/local/bin/zapret.dat
              subPath: zapret.dat

      volumes:
      - name: xray-data
        emptyDir: {}