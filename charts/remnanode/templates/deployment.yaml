apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remnanode.fullname" . }}
  labels:
    {{- include "remnanode.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "remnanode.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "remnanode.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-downloader.yaml") . | sha256sum }}
    spec:
      automountServiceAccountToken: false
      hostNetwork: {{ if .Values.node.hostNetwork }}true{{ else }}false{{ end }}
      dnsPolicy: {{ if .Values.node.hostNetwork }}ClusterFirstWithHostNet{{ else }}ClusterFirst{{ end }}

      initContainers:
        - name: init-downloader
          image: curlimages/curl:8.18.0
          command: ["/bin/sh", "/scripts/download.sh", "init"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: geodata
              mountPath: /data

      containers:
        - name: remnanode
          image: "{{ .Values.node.image.repository }}:{{ .Values.node.image.tag }}"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: NODE_PORT
              value: {{ .Values.node.apiPort | quote }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ coalesce .Values.node.existingSecret (printf "%s-secrets" (include "remnanode.fullname" .)) }}
                  key: SECRET_KEY
            - name: XRAY_LOCATION_ASSET
              value: /data
          ports:
            - containerPort: {{ .Values.node.apiPort }}
              name: api
              protocol: TCP
              {{- if .Values.node.hostNetwork }}
              hostPort: {{ .Values.node.apiPort }}
              {{- end }}
            {{- range .Values.inbounds }}
            - containerPort: {{ .port }}
              name: tcp-{{ .port }}
              protocol: TCP
              {{- if and $.Values.node.hostNetwork (eq .mode "direct") }}
              hostPort: {{ .port }}
              {{- end }}
            {{- end }}
          volumeMounts:
            - name: geodata
              mountPath: /data
          resources:
            {{- toYaml .Values.node.resources | nindent 12 }}
        - name: background-updater
          image: curlimages/curl:8.18.0
          command:
            - /bin/sh
            - -c
            - |
              echo "[SIDECAR] Started. Will update geodata every 12 hours in background."
              while true; do
                sleep 43200
                /bin/sh /scripts/download.sh update
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: geodata
              mountPath: /data

      volumes:
        - name: geodata
          persistentVolumeClaim:
            claimName: {{ include "remnanode.fullname" . }}-geodata
        - name: scripts
          configMap:
            name: {{ include "remnanode.fullname" . }}-downloader-script
            defaultMode: 0755