# charts/remnanode/values.yaml

global:
  domain: "example.com"

# Настройки автоматического обновления баз (geoip/geosite/zapret) и рестарта
autoUpdate:
  enabled: true
  # Расписание в формате Cron. По умолчанию: каждый день в 04:00
  schedule: "0 4 * * *"
  # Образ kubectl для выполнения рестарта
  image:
    repository: bitnami/kubectl
    tag: latest
    pullPolicy: IfNotPresent

# Настройки для сайта-заглушки
website:
  enabled: true
  image:
    repository: th3ro/remnanode_website
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# Настройки ядра Xray
node:
  image:
    repository: remnawave/node
    tag: 2.3.0
    pullPolicy: IfNotPresent
  apiPort: 2222
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1024Mi"
  
  # Практика безопасности: позволяем передать уже существующий секрет
  # Если указано, чарт не будет создавать свой Secret для SECRET_KEY
  existingSecret: ""
  secretKey: "" # Используется, если existingSecret пустой

# Настройки маршрутизации и сертификатов (Универсальный блок)
ingress:
  enabled: true
  tls:
    enabled: true
    # Вариант 1: Использовать встроенный резолвер Traefik (Let's Encrypt)
    certResolver: "le" 
    # Вариант 2: Использовать существующий Kubernetes Secret (например, от cert-manager)
    # Если указан secretName, certResolver будет проигнорирован
    secretName: ""

# Конфигурация портов и режимов
# Поддерживаемые режимы (mode): ingress-sni, ingress-path, ingress-xhttp, ingress-grpc, direct
inbounds: []
# Пример:
# - name: vless-ws
#   port: 10003
#   mode: ingress-path
#   path: "/api/media/"