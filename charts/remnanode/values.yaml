global:
  domain: "example.com"

# Settings for automatic database updates (geoip/geosite/zapret) and node restarts
autoUpdate:
  enabled: true
  # Schedule in Cron format. Default: every day at 04:00 AM
  schedule: "0 4 * * *"
  # Kubectl image used to trigger the rollout restart
  image:
    repository: bitnami/kubectl
    tag: latest
    pullPolicy: IfNotPresent

# Settings for the camouflage/fallback website
website:
  enabled: true
  image:
    repository: th3ro/remnanode_website
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# Xray core settings
node:
  image:
    repository: remnawave/node
    tag: 2.6.1
    pullPolicy: IfNotPresent
  apiPort: 2222
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1024Mi"
  
  # Security best practice: allow passing an already existing secret (e.g., from Vault/ExternalSecrets)
  # If specified, the chart will not create its own Secret for SECRET_KEY
  existingSecret: ""
  secretKey: "" # Used only if existingSecret is empty

# Routing and certificate settings (Universal block)
ingress:
  enabled: true
  tls:
    enabled: true
    # Enable HTTP to HTTPS redirection for the stub site
    redirect: true
    # Option 1: Use Traefik's built-in resolver (e.g., Let's Encrypt)
    certResolver: "le" 
    # Option 2: Use an existing Kubernetes Secret (e.g., generated by cert-manager)
    # If secretName is specified, certResolver will be ignored
    secretName: ""

# Configuration of ports and routing modes
# Supported modes: ingress-sni, ingress-path, ingress-xhttp, ingress-grpc, direct
inbounds: []

